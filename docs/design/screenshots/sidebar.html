<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sidebar 시안 — 안 A</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --bg:#f2f2f7;--bg2:#e9e9ee;--card:#fff;
  --sep:rgba(60,60,67,.10);--sep2:rgba(60,60,67,.06);
  --t1:#1c1c1e;--t2:#8e8e93;--t3:#aeaeb2;
  --blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --font:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
html,body{margin:0;padding:0;font-family:var(--font);color:var(--t1);
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);min-height:100vh;font-size:13px;line-height:1.45}
.shell{max-width:300px;padding:18px 14px 36px;display:flex;flex-direction:column;gap:8px}
.kick{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--t3);padding:14px 6px 7px}
.kick:first-child{padding-top:0}
.group{background:var(--card);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden}
.row{padding:13px 16px;border-bottom:1px solid var(--sep2)}
.row:last-child{border-bottom:none}
.lab{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--t2);text-transform:uppercase;margin-bottom:6px}
.path{font-size:12px;font-weight:500;color:var(--t2);word-break:break-all}
.phase-id{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--blue);margin-bottom:3px}
.phase-h{font-size:25px;font-weight:700;letter-spacing:-.025em;margin:0;line-height:1.04}
.bar{height:6px;border-radius:99px;background:#e5e5ea;margin-top:14px;overflow:hidden}
.bar i{display:block;height:100%;width:57%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--orange))}
.meta{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--t2);margin-top:9px;font-feature-settings:"tnum"}
.p-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--sep2);font-size:14px;font-weight:500}
.p-row:last-child{border-bottom:none}
.p-row.cur{font-weight:700}
.p-row.todo{color:var(--t3)}
.dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.dot.done{background:var(--green)}
.dot.cur{background:var(--blue);box-shadow:0 0 0 4px rgba(0,122,255,.16)}
.dot.todo{border:1.5px solid #d1d1d6}
.pid{font-size:11px;font-weight:600;color:var(--t3);font-feature-settings:"tnum"}
.pname{flex:1}
.pdate{font-size:11px;color:var(--t3);font-weight:500;font-feature-settings:"tnum"}
.focus .fl{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--blue);text-transform:uppercase;margin-bottom:7px}
.focus .ft{font-size:14px;line-height:1.55;font-weight:500}
.chk{width:9px;height:9px}
</style>
</head>
<body>
<div class="shell">

  <div class="kick">BLUEPRINT</div>
  <div class="group">
    <div class="row">
      <div class="lab">Workspace</div>
      <div class="path">c:\Users\snu90\Desktop\claude projects\대시보드 확장 프로그램</div>
    </div>
    <div class="row">
      <div class="phase-id">PHASE 3</div>
      <h1 class="phase-h">IMPLEMENT</h1>
      <div class="bar"><i></i></div>
      <div class="meta"><span>4 / 7 phases</span><span>57%</span></div>
    </div>
  </div>

  <div class="kick">PHASES</div>
  <div class="group">
    <div class="p-row"><span class="dot done"><svg class="chk" viewBox="0 0 10 10"><path d="M1.5 5.2 4 7.5 8.5 2.5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pid">P0</span><span class="pname">PRODUCT</span><span class="pdate">05-22</span></div>
    <div class="p-row"><span class="dot done"><svg class="chk" viewBox="0 0 10 10"><path d="M1.5 5.2 4 7.5 8.5 2.5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pid">P1</span><span class="pname">DESIGN</span><span class="pdate">05-22</span></div>
    <div class="p-row"><span class="dot done"><svg class="chk" viewBox="0 0 10 10"><path d="M1.5 5.2 4 7.5 8.5 2.5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pid">P2</span><span class="pname">ARCHITECTURE</span><span class="pdate">05-22</span></div>
    <div class="p-row cur"><span class="dot cur"></span><span class="pid">P3</span><span class="pname">IMPLEMENT</span><span class="pdate"></span></div>
    <div class="p-row todo"><span class="dot todo"></span><span class="pid">P4</span><span class="pname">REVIEW</span><span class="pdate"></span></div>
    <div class="p-row todo"><span class="dot todo"></span><span class="pid">P5</span><span class="pname">SHIP</span><span class="pdate"></span></div>
    <div class="p-row todo"><span class="dot todo"></span><span class="pid">P6</span><span class="pname">POST-SHIP</span><span class="pdate"></span></div>
  </div>

  <div class="kick">CURRENT FOCUS</div>
  <div class="group">
    <div class="row focus">
      <div class="fl">PHASE 3 · IMPLEMENT</div>
      <div class="ft">단위 8: 가운데 webview 4페이지 멀티탭 완료. 단위 9 V0+ 최종 동작 검증 진행 중.</div>
    </div>
  </div>

</div>
</body>
</html>
